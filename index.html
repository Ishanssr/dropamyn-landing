<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropamyn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  overflow: hidden;
}

/* BACKGROUND IMAGE GRID */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1523398002811-999ca8dec234') center/cover;
  filter: blur(20px) brightness(0.4);
  z-index: -2;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, rgba(10,15,44,0.8), black);
  z-index: -1;
}

/* LOGO TOP LEFT */
.logo {
  position: absolute;
  top: 30px;
  left: 40px;
  font-size: 1.8rem;
  font-weight: 600;
  text-shadow: 0 0 15px rgba(100,150,255,0.8);
}

/* CENTER CONTENT */
.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* CURSIVE ANIMATION */
.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.5rem;
  color: #7aa2ff;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 3s steps(30) forwards, blink 0.7s infinite;
}

@keyframes typing {
  to { width: 300px; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

.sub {
  margin-top: 15px;
  opacity: 0.7;
}

.input-box {
  margin-top: 30px;
}

input {
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 6px 0 0 6px;
}

button {
  padding: 12px 20px;
  background: #4a7dff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 0 6px 6px 0;
}

button:hover {
  background: #6f9bff;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="logo">Dropamyn</div>

<div class="container">
  
  <div class="tagline">
    Drop culture in India.
  </div>

  <div class="sub">
    Discover. Track. Never miss a drop.
  </div>

  <div class="input-box">
    <input type="email" placeholder="Enter your email">
    <button>Get Access</button>
  </div>

</div>

</body>
</html>
