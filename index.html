<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropamyn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* LOGO */
.logo {
  position: absolute;
  top: 30px;
  left: 40px;
  font-size: 1.5rem;
  font-weight: 500;
  color: #eaeaea;
  z-index: 10;
}

/* BACKGROUND */
.bg-wrapper {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -2;
}

.bg-track {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  width: 200%;
  animation: scroll 45s linear infinite;
  transform: rotate(-8deg);
}

.bg-track img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  opacity: 0.45;
  border-radius: 12px;
  transition: transform 0.4s ease;
}

.bg-track img:hover {
  transform: scale(1.1);
  opacity: 0.9;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.2), black 70%);
  z-index: -1;
}

/* HERO */
.hero {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  max-width: 850px;
}

.hero h1 {
  font-size: 3rem;
  font-weight: 600;
  line-height: 1.3;
}

/* COMING SOON */
.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.8rem;
  color: #7aa2ff;
  margin-top: 20px;
}

/* SUB */
.sub {
  margin-top: 8px;
  font-size: 1rem;
  opacity: 0.7;
}

/* CTA */
.cta-bar {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

.cta-bar .label {
  font-size: 0.9rem;
  margin-bottom: 10px;
  opacity: 0.7;
}

.input-box {
  display: flex;
  justify-content: center;
}

input {
  padding: 14px;
  border: none;
  width: 260px;
  border-radius: 6px 0 0 6px;
}

button {
  padding: 14px 20px;
  background: #4a7dff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 0 6px 6px 0;
}

button:hover {
  background: #6f9bff;
}

/* SCROLL ANIMATION */
@keyframes scroll {
  0% { transform: translateY(0) rotate(-8deg); }
  100% { transform: translateY(-50%) rotate(-8deg); }
}
</style>
</head>

<body>

<div class="logo">Dropamyn</div>

<div class="overlay"></div>

<div class="bg-wrapper">
  <div class="bg-track">

    <!-- SNEAKERS / STREETWEAR / TECH -->
    <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
    <img src="https://images.unsplash.com/photo-1600180758890-6c3c1e38c5c6">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
    <img src="https://images.unsplash.com/photo-1528701800489-20be3c1d5e56">

    <img src="https://images.unsplash.com/photo-1593032465171-8e0c9bfc6a64">
    <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30">

    <!-- GAMING / TECH -->
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
    <img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6">

    <!-- REPEAT FOR DENSITY -->
    <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <img src="https://images.unsplash.com/photo-1593032465171-8e0c9bfc6a64">

  </div>
</div>

<div class="hero">

  <h1>
    India’s drop culture starts now,<br>
    get ready to hit the dopamine on Dropamyn.
  </h1>

  <div class="tagline">
    Coming soon.
  </div>

  <div class="sub">
    Be first. Be only.
  </div>

</div>

<div class="cta-bar">

  <div class="label">
    Register to get early access
  </div>

  <div class="input-box">
    <input placeholder="Enter your email">
    <button>Request Invite</button>
  </div>

</div>

</body>
</html>
