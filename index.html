<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropamyn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* LOGO */
.logo {
  position: absolute;
  top: 30px;
  left: 40px;
  font-size: 1.6rem;
  font-weight: 500;
  color: #eaeaea;
  z-index: 10;
}

/* BACKGROUND SCROLL GRID */
.bg-wrapper {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -2;
}

.bg-track {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  width: 200%;
  animation: scroll 40s linear infinite;
  transform: rotate(-8deg);
}

.bg-track img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  opacity: 0.5;
  border-radius: 10px;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.2), black 70%);
  z-index: -1;
}

/* HERO */
.hero {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  max-width: 900px;
  padding: 20px;
}

.hero h1 {
  font-size: 4rem;
  font-weight: 600;
  line-height: 1.2;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: #7aa2ff;
  margin-top: 15px;
}

.sub {
  margin-top: 10px;
  opacity: 0.85;
  font-size: 1rem;
}

.input-box {
  margin-top: 30px;
}

input {
  padding: 14px;
  border: none;
  width: 260px;
  border-radius: 6px 0 0 6px;
}

button {
  padding: 14px 20px;
  background: #4a7dff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 0 6px 6px 0;
  font-weight: 500;
}

button:hover {
  background: #6f9bff;
}

/* ANIMATION */
@keyframes scroll {
  0% { transform: translateY(0) rotate(-8deg); }
  100% { transform: translateY(-50%) rotate(-8deg); }
}
</style>
</head>

<body>

<div class="logo">Dropamyn</div>

<div class="overlay"></div>

<div class="bg-wrapper">
  <div class="bg-track">

    <!-- Reliable image set (repeat for density) -->
    <img src="https://picsum.photos/300/200?random=1">
    <img src="https://picsum.photos/300/200?random=2">
    <img src="https://picsum.photos/300/200?random=3">
    <img src="https://picsum.photos/300/200?random=4">
    <img src="https://picsum.photos/300/200?random=5">
    <img src="https://picsum.photos/300/200?random=6">

    <img src="https://picsum.photos/300/200?random=7">
    <img src="https://picsum.photos/300/200?random=8">
    <img src="https://picsum.photos/300/200?random=9">
    <img src="https://picsum.photos/300/200?random=10">
    <img src="https://picsum.photos/300/200?random=11">
    <img src="https://picsum.photos/300/200?random=12">

    <!-- repeat again -->
    <img src="https://picsum.photos/300/200?random=13">
    <img src="https://picsum.photos/300/200?random=14">
    <img src="https://picsum.photos/300/200?random=15">
    <img src="https://picsum.photos/300/200?random=16">
    <img src="https://picsum.photos/300/200?random=17">
    <img src="https://picsum.photos/300/200?random=18">

  </div>
</div>

<div class="hero">

  <h1>
    India’s drop culture starts now,<br>
    get ready to hit the dopamine on Dropamyn.
  </h1>

  <div class="tagline">
    Coming soon.
  </div>

  <div class="sub">
    Be first. Be only.
  </div>

  <div class="input-box">
    <input placeholder="Enter your email">
    <button>Request Invite</button>
  </div>

</div>

</body>
</html>
