<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dropamyn</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a0f2c, #000);
      color: white;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px rgba(100,150,255,0.8);
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #7aa2ff;
      margin-top: 10px;
      font-size: 1.4rem;
    }

    .coming {
      margin-top: 15px;
      opacity: 0.7;
    }

    .input-box {
      margin-top: 30px;
    }

    input {
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 5px 0 0 5px;
    }

    button {
      padding: 12px 18px;
      background: #4a7dff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 0 5px 5px 0;
    }

    button:hover {
      background: #6f9bff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Dropamyn</h1>

    <div class="tagline">
      Drop culture in India.
    </div>

    <div class="coming">
      Coming soon. Get early access.
    </div>

    <div class="input-box">
      <input type="email" placeholder="Enter your email" />
      <button>Get Access</button>
    </div>
  </div>
</body>
</html>
