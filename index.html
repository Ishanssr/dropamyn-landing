<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropamyn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* LOGO */
.logo {
  position: absolute;
  top: 30px;
  left: 40px;
  font-size: 1.6rem;
  font-weight: 500;
  color: #eaeaea;
  z-index: 10;
}

/* BACKGROUND GRID */
.bg-container {
  position: fixed;
  width: 200%;
  height: 200%;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  transform: rotate(-10deg);
  animation: scroll 30s linear infinite;
  z-index: -2;
}

.bg-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.35;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.3), black 70%);
  z-index: -1;
}

/* HERO TEXT */
.hero {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  max-width: 800px;
}

.hero h1 {
  font-size: 3.2rem;
  font-weight: 600;
}

.hero .tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: #7aa2ff;
  margin-top: 10px;
}

.hero .sub {
  margin-top: 15px;
  opacity: 0.8;
}

.input-box {
  margin-top: 30px;
}

input {
  padding: 14px;
  border: none;
  width: 260px;
  border-radius: 6px 0 0 6px;
}

button {
  padding: 14px 20px;
  background: #4a7dff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 0 6px 6px 0;
  font-weight: 500;
}

button:hover {
  background: #6f9bff;
}

/* SCROLL ANIMATION */
@keyframes scroll {
  0% { transform: translateY(0) rotate(-10deg); }
  100% { transform: translateY(-50%) rotate(-10deg); }
}
</style>
</head>

<body>

<div class="logo">Dropamyn</div>

<div class="overlay"></div>

<div class="bg-container">

<!-- LOTS OF IMAGES -->
<img src="https://images.unsplash.com/photo-1600180758890-6c3c1e38c5c6">
<img src="https://images.unsplash.com/photo-1593032465171-8e0c9bfc6a64">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c1d5e56">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<img src="https://images.unsplash.com/photo-1584735175315-9d5df23860e6">
<img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5">
<img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30">
<img src="https://images.unsplash.com/photo-1600185365319-2d6c15a4b6a3">
<img src="https://images.unsplash.com/photo-1600185365526-35b5e1c1b0e7">
<img src="https://images.unsplash.com/photo-1600180758890-6c3c1e38c5c6">

</div>

<div class="hero">
  <h1>Drop culture is coming to India.</h1>

  <div class="tagline">
    Be first. Be early.
  </div>

  <div class="sub">
    Get early access to exclusive drops.
  </div>

  <div class="input-box">
    <input placeholder="Enter your email">
    <button>Request Invite</button>
  </div>
</div>

</body>
</html>
