<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropamyn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #05070f;
  color: white;
  overflow: hidden;
}

/* LOGO */
.logo {
  position: absolute;
  top: 30px;
  left: 40px;
  font-size: 1.6rem;
  color: #eaeaea;
}

/* CENTER TEXT */
.center {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: #7aa2ff;
}

.sub {
  opacity: 0.6;
  margin-top: 10px;
}

.input-box {
  margin-top: 25px;
}

input {
  padding: 12px;
  border: none;
  border-radius: 6px 0 0 6px;
}

button {
  padding: 12px 18px;
  background: #4a7dff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 0 6px 6px 0;
}

/* FLOATING CARDS */
.card {
  position: absolute;
  width: 160px;
  height: 200px;
  border-radius: 12px;
  overflow: hidden;
  animation: float 12s linear infinite;
  opacity: 0.2;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* positions */
.card:nth-child(1) { top: 10%; left: 10%; animation-duration: 18s; }
.card:nth-child(2) { top: 70%; left: 20%; animation-duration: 14s; }
.card:nth-child(3) { top: 20%; right: 15%; animation-duration: 20s; }
.card:nth-child(4) { bottom: 10%; right: 10%; animation-duration: 16s; }

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
  100% { transform: translateY(0); }
}

/* CURSOR GLOW */
.cursor {
  width: 20px;
  height: 20px;
  background: rgba(100,150,255,0.3);
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="logo">Dropamyn</div>

<!-- FLOATING PRODUCTS -->
<div class="card"><img src="https://images.unsplash.com/photo-1600180758890-6c3c1e38c5c6"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1593032465171-8e0c9bfc6a64"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1528701800489-20be3c1d5e56"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1519741497674-611481863552"></div>

<div class="center">
  <div class="tagline">Never miss a drop.</div>
  <div class="sub">Discover. Track. Get it before it's gone.</div>

  <div class="input-box">
    <input placeholder="Enter your email">
    <button>Request Invite</button>
  </div>
</div>

<div class="cursor" id="cursor"></div>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.top = e.clientY + "px";
  cursor.style.left = e.clientX + "px";
});
</script>

</body>
</html>
